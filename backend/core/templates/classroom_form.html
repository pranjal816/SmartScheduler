{% extends 'base.html' %}
{% block content %}
<div class="row g-4">
    <div class="col-md-5">
        <div class="card">
            <div class="card-header">Add New Classroom</div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary">Add Classroom</button>
                </form>
            </div>
        </div>
    </div>
    <div class="col-md-7">
        <div class="card">
            <div class="card-header">Existing Classrooms</div>
            <div class="card-body">
                <ul class="list-group">
                    {% for classroom in classrooms %}
                        <li class="list-group-item d-flex justify-content-between">
                            <span>{{ classroom.name }}</span>
                            <span class="text-muted">Capacity: {{ classroom.capacity }}</span>
                        </li>
                    {% empty %}
                        <li class="list-group-item">No classrooms added yet.</li>
                    {% endfor %}
                </ul>
            </div>
        </div>
    </div>
</div>
{% endblock %}
