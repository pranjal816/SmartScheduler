{% extends 'base.html' %}
{% block content %}
<div class="row g-4">
    <div class="col-md-5">
        <div class="card">
            <div class="card-header">Add New Time Slot</div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary">Add Time Slot</button>
                </form>
            </div>
        </div>
    </div>
    <div class="col-md-7">
        <div class="card">
            <div class="card-header">Existing Time Slots</div>
            <div class="card-body">
                <ul class="list-group">
                    {% for timeslot in timeslots %}
                        <li class="list-group-item d-flex justify-content-between">
                            <span>{{ timeslot }}</span>
                            {% if timeslot.is_lunch %}<span class="badge bg-warning text-dark">Lunch</span>{% endif %}
                        </li>
                    {% empty %}
                        <li class="list-group-item">No time slots added yet.</li>
                    {% endfor %}
                </ul>
            </div>
        </div>
    </div>
</div>
{% endblock %}
