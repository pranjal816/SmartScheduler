<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartScheduler</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/custom.css">
</head>
<body>
    <div class="container-fluid">
        <div class="row min-vh-100">
            <aside class="col-md-3 col-lg-2 sidebar py-4">
                <h4 class="mb-4">SmartScheduler</h4>
                <ul class="nav flex-column gap-2">
                    <li class="nav-item"><a class="nav-link" href="{% url 'index' %}">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'add_teacher' %}">Add Teacher</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'add_classroom' %}">Add Classroom</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'add_subject' %}">Add Subject</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'add_timeslot' %}">Add Time Slot</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'add_batch' %}">Add Batch</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'timetable_view' %}">View Timetable</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'free_classroom' %}">Free Classroom Finder</a></li>
                </ul>
            </aside>
            <main class="col-md-9 col-lg-10 main-content py-4">
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    {% endfor %}
                {% endif %}
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
